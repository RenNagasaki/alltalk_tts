stages:
  - build

variables:
  DOCKER_HOST: tcp://docker:2376
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_CERT_PATH: "/certs/client"
  DOCKER_TLS_VERIFY: "1"
  DOCKER_DRIVER: overlay2
  TTS_MODEL: "xtts"
  DOCKER_TAG: "latest"
  # Use upstream base image from Docker Hub (building it locally is too heavy for DinD)
  BASE_IMAGE_REPO: "erew123/"

before_script:
  - apk add --no-cache bash jq
  - eval $(bash -c 'source ./docker/variables.sh && for key in "${!ALLTALK_VARS[@]}"; do echo "export ${key}=${ALLTALK_VARS[${key}]}"; done')
  - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

build-alltalk:
  stage: build
  timeout: 3h
  image: docker:27
  script:
    - docker build --pull
      --build-arg TTS_MODEL=$TTS_MODEL
      --build-arg DEEPSPEED_VERSION=$DEEPSPEED_VERSION
      --build-arg DOCKER_TAG=$DOCKER_TAG
      --build-arg DOCKER_REPOSITORY=$BASE_IMAGE_REPO
      -t $CI_REGISTRY_IMAGE:latest-$TTS_MODEL
      .
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker push $CI_REGISTRY_IMAGE:latest-$TTS_MODEL
  tags:
    - docker
